<svg viewBox="0 0 380 300" xmlns="http://www.w3.org/2000/svg" font-family="'Archivo','Helvetica Neue',Arial,sans-serif">
<defs><style>
 .mono{font-family:'JetBrains Mono','Courier New',monospace;}
 .ink{fill:#ECECE6;} .mut{fill:#9A9A92;} .faint{fill:#6E6E70;} .dim{fill:#5E5E64;}
 .lime{fill:#C8FF6E;} .violet{fill:#8C73FF;}
</style></defs>
<rect x="0.5" y="0.5" width="379" height="299" rx="10" fill="#16161C" stroke="rgba(255,255,255,0.12)"/>
<text x="20" y="34" class="ink" font-weight="700" font-size="16">CFO View</text>
<text x="20" y="51" class="mono faint" font-size="9">Capital-efficiency lens</text>
<circle cx="356" cy="28" r="5" class="violet"/>
<text x="344" y="31" class="mono violet" font-size="8" letter-spacing="1" text-anchor="end">ACTIVE</text>
<line x1="0" y1="66" x2="380" y2="66" stroke="rgba(255,255,255,0.09)"/>
<text x="20" y="96" class="mono mut" font-size="11">Burn Multiple</text>
<text x="360" y="96" class="ink lime" font-weight="700" font-size="16" text-anchor="end" font-family="'Archivo',sans-serif">1.2x</text>
<line x1="20" y1="109" x2="360" y2="109" stroke="rgba(255,255,255,0.07)"/>
<text x="20" y="130" class="mono mut" font-size="11">Net Magic Number</text>
<text x="360" y="130" class="ink" font-weight="700" font-size="16" text-anchor="end" font-family="'Archivo',sans-serif">3.46</text>
<line x1="20" y1="143" x2="360" y2="143" stroke="rgba(255,255,255,0.07)"/>
<text x="20" y="164" class="mono mut" font-size="11">Gross Margin</text>
<text x="360" y="164" class="ink" font-weight="700" font-size="16" text-anchor="end" font-family="'Archivo',sans-serif">78%</text>
<line x1="20" y1="177" x2="360" y2="177" stroke="rgba(255,255,255,0.07)"/>
<text x="20" y="198" class="mono mut" font-size="11">CAC Payback</text>
<text x="360" y="198" class="ink lime" font-weight="700" font-size="16" text-anchor="end" font-family="'Archivo',sans-serif">0.2 mo</text>
<line x1="20" y1="211" x2="360" y2="211" stroke="rgba(255,255,255,0.07)"/>
<text x="20" y="232" class="mono mut" font-size="11">Runway</text>
<text x="360" y="232" class="ink" font-weight="700" font-size="16" text-anchor="end" font-family="'Archivo',sans-serif">22 mo</text>
<line x1="20" y1="245" x2="360" y2="245" stroke="rgba(255,255,255,0.07)"/>
<text x="20" y="266" class="mono mut" font-size="11">Rule of 40</text>
<text x="360" y="266" class="ink lime" font-weight="700" font-size="16" text-anchor="end" font-family="'Archivo',sans-serif">302</text>
<line x1="20" y1="279" x2="360" y2="279" stroke="rgba(255,255,255,0.07)"/>
<text x="20" y="285" class="mono faint" font-size="9" letter-spacing="1">CAPITAL EFFICIENCY</text>
<rect x="296" y="272" width="64" height="20" rx="3" fill="#C8FF6E"/>
<text x="328" y="286" font-family="'JetBrains Mono',monospace" font-size="9" font-weight="700" letter-spacing="1" fill="#111111" text-anchor="middle">GOVERNED</text>
</svg>