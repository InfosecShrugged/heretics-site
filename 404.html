<title>NetherOps — Coming Soon</title>

<meta name="description" content="Introducing governed revenue operations. From the Heretics team.">

<style>
@font-face { font-family: 'TWK Everett'; src: url('/fonts/TWKEverett-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
@font-face { font-family: 'TWK Everett'; src: url('/fonts/TWKEverett-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
@font-face { font-family: 'TWK Everett'; src: url('/fonts/TWKEverett-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #D6D6D1;
  --text: #111111;
  --muted: #555555;
  --dim: #909090;
  --accent-violet: #5B3DF0;
  --accent-lime: #C8FF6E;
  --border: rgba(0,0,0,0.13);
  --border-light: rgba(0,0,0,0.07);
  --font-display: 'TWK Everett', 'Helvetica Neue', sans-serif;
  --font-mono: 'Chivo Mono', 'Space Mono', monospace;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  /* Tokens consumed by the shared <heretics-house-map>, mapped from local
     tokens. Fallback chain covers all 6 token-naming variants used across
     the NetherOps subpages (--bg-base/--bg/--gy, etc.). */
  --house-bg: var(--bg-base, var(--bg, var(--gy, #D6D6D1)));
  --house-ink: var(--ink, var(--bk, #111111));
  --house-mut: var(--ink-mid, var(--muted, var(--g7, #555555)));
  --house-faint: var(--ink-muted, var(--faint, var(--g5, #909090)));
  --house-line: var(--border-mid, var(--border, var(--border-strong, var(--g3, rgba(0,0,0,0.16)))));
  --house-accent: var(--accent-violet, var(--accent, var(--or, #5B3DF0)));
}

html,body{
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-display);
  -webkit-font-smoothing:antialiased;
}

.page{
  position:relative;
  width:100%;height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  overflow:hidden;
}

/* ── Subtle grain ── */
.page::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:0.018;pointer-events:none;z-index:100;
}

/* ── Video layer ── */
.video-track{
  position:absolute;inset:0;
  pointer-events:none;z-index:1;
}

.video-walker{
  position:absolute;
  bottom:-4%;
  right:5%;
  height:75vh;width:auto;
  mix-blend-mode:multiply;
  filter:brightness(1.15) contrast(1.4);
  opacity:0.09;
  transform-origin:center bottom;
  -webkit-mask-image:radial-gradient(ellipse 70% 78% at center 50%,black 35%,transparent 100%);
  mask-image:radial-gradient(ellipse 70% 78% at center 50%,black 35%,transparent 100%);
  animation:approach 6.3s linear infinite;
}

@keyframes approach{
  0%  {transform:scale(.92);opacity:.05}
  15% {opacity:.09}
  85% {opacity:.09}
  100%{transform:scale(1.06);opacity:.03}
}

/* ── Content ── */
.content{
  position:relative;z-index:10;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;
  opacity:0;
  animation:fadeUp 1.4s var(--ease) .2s both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to  {opacity:1;transform:translateY(0)}
}

/* Logo — black mark on light bg */
.logo{
  width:clamp(240px,42vw,420px);
  height:auto;
  margin-bottom:48px;
}

/* Headline */
.headline{
  font-family:var(--font-display);
  font-weight:400;
  font-size:clamp(15px,2.6vw,22px);
  line-height:1.65;
  color:var(--muted);
  letter-spacing:.01em;
  max-width:440px;
  margin-bottom:56px;
}

.headline em{
  font-style:normal;
  color:var(--accent-violet);
}

.headline strong{
  font-weight:700;
  color:var(--text);
}

/* Status pill */
.status{
  display:inline-flex;align-items:center;gap:10px;
  padding:8px 20px;
  border:1px solid var(--border);
  border-radius:100px;
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--dim);
}

.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent-lime);
  animation:pulse 2.8s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{opacity:.35;box-shadow:0 0 0 0 rgba(200,255,110,0)}
  50%    {opacity:1;  box-shadow:0 0 12px 2px rgba(200,255,110,.25)}
}

/* ── Bottom bar ── */
.bottom-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  padding:20px 32px;
  display:flex;justify-content:space-between;align-items:center;
  border-top:1px solid var(--border-light);
  opacity:0;
  animation:fadeUp .8s var(--ease) 1.2s both;
}

.bottom-bar a{
  font-family:var(--font-mono);
  font-size:11px;letter-spacing:.08em;
  color:var(--dim);text-decoration:none;
  transition:color .3s;
}
.bottom-bar a:hover{color:var(--accent-violet)}

.bottom-label{
  font-family:var(--font-mono);
  font-size:10px;letter-spacing:.15em;
  color:var(--dim);text-transform:uppercase;
}

/* ── Corner accent ── */
.corner{
  position:absolute;top:-1px;right:-1px;
  width:200px;height:200px;z-index:2;
  opacity:.04;
  background:radial-gradient(ellipse at top right,var(--accent-violet) 0%,transparent 70%);
}

/* ── Mobile hero image (replaces video) ── */
.mobile-hero{
  display:none;
}

/* ── Mobile ── */
@media(max-width:640px){
  .video-track{display:none}
  .mobile-hero{
    display:block;
    position:absolute;
    bottom:-5%;right:-8%;
    width:65vw;height:auto;
    opacity:0.09;
    mix-blend-mode:multiply;
    pointer-events:none;
    z-index:1;
  }
  .logo{width:220px;margin-bottom:36px}
  .headline{font-size:14px;margin-bottom:40px;padding:0 24px}
  .status{font-size:10px;padding:6px 16px}
  .bottom-bar{padding:16px 20px;flex-direction:column;gap:8px}
}

.house-footer{background:var(--dark,#16161A);color:#9A968C;padding:54px 0 32px;border-top:1px solid rgba(255,255,255,0.08)}
.house-footer .wrap{max-width:1180px;margin:0 auto;padding:0 32px}
.hf-mast{display:flex;align-items:center;gap:20px;margin-bottom:40px;padding-bottom:28px;border-bottom:1px solid rgba(255,255,255,0.06)}
.hf-mast-raven{width:auto;height:64px;color:var(--accent-ink);flex-shrink:0;display:block}
.hf-mast-raven path{fill:currentColor}
.hf-mast-text{display:flex;flex-direction:column;gap:8px;line-height:1}
.hf-mast-title{font-family:var(--display);font-size:24px;font-weight:425;letter-spacing:-.012em;color:#ECEAE3;font-style:italic;font-variation-settings:"opsz" 144,"wght" 425,"SOFT" 0,"WONK" 0}
.hf-mast-title em{font-style:italic;color:var(--accent-ink);font-weight:425}
.hf-mast-sub{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#56564E;font-weight:500}
.hf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:36px}
.hf-col-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#56564E;margin-bottom:14px}
.hf-col-name{display:block;font-family:var(--display);font-weight:700;font-size:16px;color:#ECEAE3;letter-spacing:-.01em;margin-bottom:4px;text-decoration:none}
.hf-col-name:hover{color:var(--accent-ink)}
.hf-col-tag{font-size:12px;color:#7E7A74;line-height:1.5;margin-bottom:16px;max-width:28ch}
.hf-col-links{display:flex;flex-direction:column;gap:9px}
.hf-col-links a{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#7E7A74;font-weight:500;text-decoration:none;transition:color .15s}
.hf-col-links a:hover{color:var(--accent-ink)}
.hf-col-links a .arr{color:#56564E;font-weight:400}
.hf-col-links a .arr:first-child{margin-right:7px}
.hf-col-links a .arr:not(:first-child){margin:0 .35em}
.hf-col-links a:hover .arr:first-child{color:var(--accent-ink)}
.hf-col-sub{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:#56564E;margin-top:14px;text-decoration:none}
.hf-col-sub .arr{color:#56564E;font-weight:400}
.hf-col-sub .arr:first-child{margin-right:6px}
.hf-col-sub .arr:not(:first-child){margin:0 .35em}
.hf-col-sub:hover{color:var(--accent-ink)}
/* "You are here" — applied to whichever column matches data-property */
.hf-col.is-here .hf-col-name{color:var(--accent-ink)}
.hf-col.is-here .hf-col-name::after{content:" · you are here";font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:#56564E;font-weight:400}
/* Engagement context strip — only on non-Heretics properties */
.hf-engagement{display:none;margin-top:36px;padding:20px 22px;border:1px solid rgba(245,214,16,0.18);border-left:2px solid var(--accent-ink);background:rgba(245,214,16,0.03);border-radius:3px}
.hf-engagement-link{display:block;font-family:var(--display);font-weight:600;font-size:15px;color:var(--accent-ink);text-decoration:none;margin-bottom:4px}
.hf-engagement-text{font-size:12px;color:#9A968C;line-height:1.55;max-width:64ch}
html[data-property="mis"] .hf-engagement,
html[data-property="atlas"] .hf-engagement,
html[data-property="kumite"] .hf-engagement,
html[data-property="netherops"] .hf-engagement,
html[data-property="opptycon"] .hf-engagement{display:block}
/* Legal strip */
.hf-legal{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-top:36px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.06);font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#56564E;flex-wrap:wrap}
.hf-legal a{color:#7E7A74;text-decoration:none;transition:color .15s}
.hf-legal a:hover{color:var(--accent-ink)}
.hf-legal .hf-legal-sep{color:#3A3833;margin:0 6px}
@media(max-width:820px){.hf-grid{grid-template-columns:1fr;gap:32px}.hf-legal{justify-content:flex-start}}
</style>
</head>
