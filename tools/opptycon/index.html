<!DOCTYPE html>
<html lang="en" data-property="netherops" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpptyCon | NetherOps</title>
    <meta name="description" content="OpptyCon — Revenue simulation and governance control surface by NetherOps" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/tokens.css">
<style>
      @font-face { font-family: 'TWK Everett'; src: url('/fonts/TWKEverett-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
      @font-face { font-family: 'TWK Everett'; src: url('/fonts/TWKEverett-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
      @font-face { font-family: 'TWK Everett'; src: url('/fonts/TWKEverett-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
    
.house-footer{background:var(--dark,#16161A);color:#9A968C;padding:54px 0 32px;border-top:1px solid rgba(255,255,255,0.08)}
.house-footer .wrap{max-width:1180px;margin:0 auto;padding:0 32px}
.hf-mast{display:flex;align-items:center;gap:20px;margin-bottom:40px;padding-bottom:28px;border-bottom:1px solid rgba(255,255,255,0.06)}
.hf-mast-raven{width:auto;height:64px;color:var(--accent-ink);flex-shrink:0;display:block}
.hf-mast-raven path{fill:currentColor}
.hf-mast-text{display:flex;flex-direction:column;gap:8px;line-height:1}
.hf-mast-title{font-family:var(--display);font-size:24px;font-weight:425;letter-spacing:-.012em;color:#ECEAE3;font-style:italic;font-variation-settings:"opsz" 144,"wght" 425,"SOFT" 0,"WONK" 0}
.hf-mast-title em{font-style:italic;color:var(--accent-ink);font-weight:425}
.hf-mast-sub{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#56564E;font-weight:500}
.hf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:36px}
.hf-col-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#56564E;margin-bottom:14px}
.hf-col-name{display:block;font-family:var(--display);font-weight:700;font-size:16px;color:#ECEAE3;letter-spacing:-.01em;margin-bottom:4px;text-decoration:none}
.hf-col-name:hover{color:var(--accent-ink)}
.hf-col-tag{font-size:12px;color:#7E7A74;line-height:1.5;margin-bottom:16px;max-width:28ch}
.hf-col-links{display:flex;flex-direction:column;gap:9px}
.hf-col-links a{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#7E7A74;font-weight:500;text-decoration:none;transition:color .15s}
.hf-col-links a:hover{color:var(--accent-ink)}
.hf-col-links a .arr{color:#56564E;font-weight:400}
.hf-col-links a .arr:first-child{margin-right:7px}
.hf-col-links a .arr:not(:first-child){margin:0 .35em}
.hf-col-links a:hover .arr:first-child{color:var(--accent-ink)}
.hf-col-sub{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:#56564E;margin-top:14px;text-decoration:none}
.hf-col-sub .arr{color:#56564E;font-weight:400}
.hf-col-sub .arr:first-child{margin-right:6px}
.hf-col-sub .arr:not(:first-child){margin:0 .35em}
.hf-col-sub:hover{color:var(--accent-ink)}
/* "You are here" — applied to whichever column matches data-property */
.hf-col.is-here .hf-col-name{color:var(--accent-ink)}
.hf-col.is-here .hf-col-name::after{content:" · you are here";font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:#56564E;font-weight:400}
/* Engagement context strip — only on non-Heretics properties */
.hf-engagement{display:none;margin-top:36px;padding:20px 22px;border:1px solid rgba(245,214,16,0.18);border-left:2px solid var(--accent-ink);background:rgba(245,214,16,0.03);border-radius:3px}
.hf-engagement-link{display:block;font-family:var(--display);font-weight:600;font-size:15px;color:var(--accent-ink);text-decoration:none;margin-bottom:4px}
.hf-engagement-text{font-size:12px;color:#9A968C;line-height:1.55;max-width:64ch}
html[data-property="mis"] .hf-engagement,
html[data-property="atlas"] .hf-engagement,
html[data-property="kumite"] .hf-engagement,
html[data-property="netherops"] .hf-engagement,
html[data-property="opptycon"] .hf-engagement{display:block}
/* Legal strip */
.hf-legal{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-top:36px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.06);font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#56564E;flex-wrap:wrap}
.hf-legal a{color:#7E7A74;text-decoration:none;transition:color .15s}
.hf-legal a:hover{color:var(--accent-ink)}
.hf-legal .hf-legal-sep{color:#3A3833;margin:0 6px}
@media(max-width:820px){.hf-grid{grid-template-columns:1fr;gap:32px}.hf-legal{justify-content:flex-start}}
</style>

    <style>
      * { box-sizing: border-box; }
      body { margin: 0; overflow: hidden; }
      input[type="range"] { height: 6px; }
      @media (max-width: 768px) {
        /* Collapse multi-column grids */
        div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
        div[style*="grid-template-columns: repeat(5"] { grid-template-columns: repeat(2, 1fr) !important; }
        div[style*="grid-template-columns: repeat(3"] { grid-template-columns: 1fr !important; }
        div[style*="grid-template-columns: repeat(6"] { grid-template-columns: repeat(3, 1fr) !important; }
        /* Collapse sidebar+content layouts */
        div[style*="grid-template-columns: 380px"] { grid-template-columns: 1fr !important; }
        div[style*="grid-template-columns: 220px"] { grid-template-columns: 1fr !important; }
        div[style*="grid-template-columns: 200px"] { grid-template-columns: 1fr !important; }
        div[style*="grid-template-columns: 180px"] { grid-template-columns: 1fr !important; }
        /* Touch targets */
        input[type="range"] { height: 28px; -webkit-appearance: none; }
        button { min-height: 36px; }
        /* Prevent horizontal overflow */
        main { max-width: 100vw; }
        /* Readable text */
        body { -webkit-text-size-adjust: 100%; }
      }
    </style>

    <form name="alpha-access" netlify netlify-honeypot="bot-field" hidden>
      <input name="email" /><input name="role" /><input name="company" /><input name="bot-field" />

</html>
